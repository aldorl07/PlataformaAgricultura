name: chupaca_directo
description: "Plataforma de comercio electrónico agrícola - Chupaca Directo. Del campo a tu mesa, sin intermediarios."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.2.7

  # State Management
  provider: ^6.1.2

  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  badges: ^3.1.2

  # Charts
  fl_chart: ^0.69.0

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  uuid: ^4.5.0
  collection: ^1.18.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/

